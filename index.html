<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thumb</title>
    <link rel="icon" type="image/png" href="TheThumbIcon.png">
    <style>
        :root {
            --crimson: #4a0404;
            --gold: #ffd700;
            --gold-shadow: rgba(255, 215, 0, 0.4);
        }

        /* Scrollbar Removal */
        * { scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }

        body {
            margin: 0; padding: 0;
            background: url('thethumbbackground.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Times New Roman', serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--gold);
        }

        #main-box {
            width: 800px;
            background: var(--crimson);
            border: 3px solid var(--gold);
            box-shadow: 0 0 25px var(--gold-shadow);
            padding: 40px;
            position: relative;
            max-height: 85vh;
            overflow-y: scroll;
        }

        .top-nav { display: flex; justify-content: space-between; font-size: 1rem; margin-bottom: 10px; }
        .clickable-text { cursor: pointer; transition: opacity 0.2s; font-style: italic; }
        .clickable-text:hover { opacity: 0.7; }

        .auth-panel { 
            display: none; padding: 20px 0; border-bottom: 1px solid rgba(255,215,0,0.3); 
            margin-bottom: 20px; text-align: center; animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }

        .formal-input { 
            background: transparent; border: none; border-bottom: 1px solid var(--gold); 
            color: var(--gold); font-style: italic; padding: 5px; font-family: inherit;
            outline: none; margin: 10px; width: 160px;
        }

        .thumb-icon { width: 180px; display: block; margin: 0 auto 15px; }
        h1 { text-align: center; font-size: 3.5rem; margin: 0; letter-spacing: 4px; text-transform: uppercase; }
        .motto { text-align: center; font-style: italic; font-size: 1.2rem; margin-top: 10px; line-height: 1.4; }
        .gold-line { width: 90%; height: 1px; background: var(--gold); margin: 25px auto; opacity: 0.7; }

        .search-container { margin-bottom: 20px; padding-left: 5px; }
        #search-input {
            background: transparent; border: none; color: var(--gold);
            font-style: italic; font-family: inherit; outline: none;
            width: 200px; font-size: 1.1rem;
        }
        #search-input::placeholder { color: var(--gold); opacity: 0.7; }

        .mgmt-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        .mgmt-table td, .mgmt-table th { padding: 10px; text-align: left; border-bottom: 1px solid rgba(255,215,0,0.2); }
        .action-btn { cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; border: 1px solid var(--gold); padding: 3px 8px; margin-right: 5px; }

        .registry-entry { margin-bottom: 15px; font-size: 1.15rem; }
        .entry-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; width: 100%; }
        .name-part { flex: 1; text-align: left; }
        .rank-part { flex: 1; text-align: right; margin-right: 25px; font-style: italic; }
        
        .details { display: none; padding: 20px 0; font-size: 1rem; border-top: 1px dashed rgba(255,215,0,0.2); margin-top: 10px; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .history-line { display: block; font-size: 0.9rem; margin-top: 5px; opacity: 0.8; text-align: center; font-style: italic; }
        .no-history { text-align: center; font-style: italic; display: block; margin-top: 10px; opacity: 0.6; color: var(--gold); }
        
        .bold-btn { font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 15px; display: inline-block; }
    </style>
</head>
<body>

<div id="main-box">
    <div class="top-nav" id="nav-triggers">
        <span class="clickable-text" id="signup-trigger">Sign up</span>
        <span class="clickable-text" id="login-trigger">Log in</span>
    </div>

    <div id="auth-area">
        <div id="register-panel" class="auth-panel">
            <input type="text" id="regDisplay" placeholder="Display Name" class="formal-input">
            <input type="text" id="regUser" placeholder="Username" class="formal-input">
            <input type="password" id="regPass" placeholder="Password" class="formal-input">
            <select id="regOrg" class="formal-input">
                <option value="" disabled selected>Organisation</option>
                <option value="Ring">Ring</option>
                <option value="Middle">Middle</option>
                <option value="Index">Index</option>
                <option value="Pinky">Pinky</option>
                <option value="Thumb">Thumb</option>
            </select>
            <div id="reg-error" style="color:var(--gold); font-size:0.8rem;"></div>
            <div class="bold-btn" id="doRegister">Register</div>
            <div class="clickable-text" onclick="closeAuth()">Cancel</div>
        </div>

        <div id="login-panel" class="auth-panel">
            <input type="text" id="logUser" placeholder="Username" class="formal-input">
            <input type="password" id="logPass" placeholder="Password" class="formal-input">
            <div class="bold-btn" id="doLogin">Enter</div>
            <div class="clickable-text" onclick="closeAuth()">Cancel</div>
        </div>

        <div id="mgmt-panel" class="auth-panel">
            <h2 style="font-size: 1.2rem; border-bottom: 1px solid var(--gold); display: inline-block; padding-bottom: 5px; text-transform: uppercase;">Management</h2>
            <table class="mgmt-table">
                <thead><tr><th>Name</th><th>Rank</th><th>Action</th></tr></thead>
                <tbody id="mgmt-body"></tbody>
            </table>
            <div class="bold-btn" onclick="closeAuth()">Close</div>
        </div>

        <div id="user-info-panel" class="auth-panel">
            <div id="my-info-content"></div>
            <div class="bold-btn" id="collapse-info-btn">Collapse Information</div>
            <div class="bold-btn" id="doLogout" style="color:#ff4d4d;">Log out</div>
        </div>
    </div>

    <img src="TheThumbIcon.png" alt="Thumb" class="thumb-icon">
    <h1>The Thumb</h1>
    <div class="motto">La vanità del Soldato,<br>la gloria della famiglia.</div>
    <div class="gold-line"></div>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search...">
    </div>

    <div id="registry-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const accountConfig = {
        apiKey: "AIzaSyDHSXFPCiG2kjRAFzqUJn1OQoXD1bCtfH8",
        authDomain: "account-data-54450.firebaseapp.com",
        databaseURL: "https://account-data-54450-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "account-data-54450"
    };

    const app = initializeApp(accountConfig);
    const db = getDatabase(app);

    let currentUser = null;
    let allUsers = [];

    // Tiers (Weight 5 to 1)
    const RANK_DEFS = [
        { weight: 5, keywords: ["lord"] },
        { weight: 4, keywords: ["great brother", "great sister", "sottocapo", "maestro", "messenger"] },
        { weight: 3, keywords: ["star"], exclude: ["aspiring"] },
        { weight: 2, keywords: ["big brother", "big sister", "capo", "docente", "proxy"] },
        { weight: 1, keywords: ["aspiring star", "student", "soldato", "proselyte", "little sister", "little brother"] }
    ];

    const getWeight = (rank) => {
        if (!rank) return 0;
        const r = rank.toLowerCase();
        for (const def of RANK_DEFS) {
            const hasKeyword = def.keywords.some(k => r.includes(k));
            const isExcluded = def.exclude ? def.exclude.some(e => r.includes(e)) : false;
            if (hasKeyword && !isExcluded) return def.weight;
        }
        return 0;
    };

    const sanitize = (str) => {
        const div = document.createElement('div');
        div.textContent = str || "";
        return div.innerHTML;
    };

    onValue(ref(db, 'users'), (snapshot) => {
        const data = snapshot.val();
        allUsers = [];
        for (let id in data) allUsers.push({ id, ...data[id] });
        renderList();
        if (currentUser) {
            currentUser = data[currentUser.username];
            if (document.getElementById('mgmt-panel').style.display === 'block') loadManagement();
        }
    });

    function renderList() {
        const filter = document.getElementById('search-input').value.toLowerCase();
        const listDiv = document.getElementById('registry-list');
        listDiv.innerHTML = "";

        const sorted = allUsers.sort((a, b) => {
            const wa = getWeight(a.rank);
            const wb = getWeight(b.rank);
            if (wb !== wa) return wb - wa;
            return (a.display_name || "").localeCompare(b.display_name || "");
        });

        sorted.forEach(u => {
            const match = (u.display_name || "").toLowerCase().includes(filter) || (u.rank || "").toLowerCase().includes(filter);
            if (filter && !match) return;

            const entry = document.createElement('div');
            entry.className = 'registry-entry';
            const head = document.createElement('div');
            head.className = 'entry-header';
            head.innerHTML = `<span class="name-part">${sanitize(u.display_name)}</span><span class="rank-part">${sanitize(u.rank)} of the ${sanitize(u.finger)}</span><span style="width:20px; text-align:right;">+</span>`;
            
            const details = document.createElement('div');
            details.className = 'details';
            const historyHtml = (u.promotion_history && u.promotion_history.length > 0) 
                ? u.promotion_history.slice().reverse().map(h => `<span class="history-line">${sanitize(h)}</span>`).join('')
                : `<span class="no-history">No promotion history</span>`;

            details.innerHTML = `<div class="detail-row"><span>Organisation</span><span>${sanitize(u.finger)}</span></div><div class="detail-row"><span>Rank</span><span>${sanitize(u.rank)}</span></div><div style="margin-top:15px; text-align:center;">Promotion History:</div>${historyHtml}`;

            head.onclick = () => {
                const isVisible = details.style.display === 'block';
                details.style.display = isVisible ? 'none' : 'block';
                head.children[2].innerText = isVisible ? '+' : '-';
            };

            entry.appendChild(head);
            entry.appendChild(details);
            listDiv.appendChild(entry);
        });
    }

    function loadManagement() {
        const body = document.getElementById('mgmt-body');
        body.innerHTML = "";
        if (!currentUser) return;

        const myWeight = getWeight(currentUser.rank);
        const myOrg = currentUser.finger;

        allUsers.forEach(u => {
            const uWeight = getWeight(u.rank);
            // Comparison logic: Same Finger AND strictly lower rank
            if (u.finger === myOrg && uWeight < myWeight && u.username !== currentUser.username) {
                const row = document.createElement('tr');
                const actions = document.createElement('td');
                const weightDiff = myWeight - uWeight;

                if (weightDiff > 1) {
                    const pBtn = document.createElement('span');
                    pBtn.className = "action-btn"; pBtn.innerText = "Promote";
                    pBtn.onclick = () => changeRank(u, 1);
                    actions.appendChild(pBtn);
                }
                if (weightDiff === 1 && uWeight > 1) {
                    const dBtn = document.createElement('span');
                    dBtn.className = "action-btn"; dBtn.innerText = "Demote";
                    dBtn.style.color = "#ff4d4d";
                    dBtn.onclick = () => changeRank(u, -1);
                    actions.appendChild(dBtn);
                }
                row.innerHTML = `<td>${sanitize(u.display_name)}</td><td>${sanitize(u.rank)}</td>`;
                row.appendChild(actions);
                body.appendChild(row);
            }
        });
        if (body.innerHTML === "") body.innerHTML = "<tr><td colspan='3' style='text-align:center;'>No subordinates available.</td></tr>";
    }

    async function changeRank(user, direction) {
        const currentWeight = getWeight(user.rank);
        const newWeight = currentWeight + direction;
        if (newWeight < 1 || newWeight > 5) return;

        const targetDef = RANK_DEFS.find(d => d.weight === newWeight);
        const uLow = user.rank.toLowerCase();
        let newRank = targetDef.keywords[0]; // fallback

        if (newWeight === 3) {
            newRank = "Star";
        } else {
            // Sibling/Gender preservation
            if (uLow.includes("sister")) {
                newRank = targetDef.keywords.find(k => k.includes("sister")) || targetDef.keywords[0];
            } else if (uLow.includes("brother")) {
                newRank = targetDef.keywords.find(k => k.includes("brother")) || targetDef.keywords[0];
            } else {
                // Org specific naming
                const map = { "Thumb": ["Soldato", "Capo", "Sottocapo"], "Index": ["Proselyte", "Proxy", "Messenger"] };
                newRank = targetDef.keywords.find(k => map[user.finger]?.some(m => k.toLowerCase().includes(m.toLowerCase()))) || targetDef.keywords[0];
            }
        }

        // Capitalize for professionalism
        newRank = newRank.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');

        const history = user.promotion_history || [];
        history.push(`${direction > 0 ? "Promoted" : "Demoted"} from ${user.rank} to ${newRank}`);
        await update(ref(db, `users/${user.username}`), { rank: newRank, promotion_history: history });
    }

    window.closeAuth = () => document.querySelectorAll('.auth-panel').forEach(p => p.style.display = 'none');
    document.getElementById('signup-trigger').onclick = () => { closeAuth(); document.getElementById('register-panel').style.display = 'block'; };
    document.getElementById('login-trigger').onclick = () => { 
        closeAuth(); 
        if(currentUser) showProfile(); 
        else document.getElementById('login-panel').style.display = 'block'; 
    };

    function showProfile() {
        const content = document.getElementById('my-info-content');
        const historyHtml = (currentUser.promotion_history && currentUser.promotion_history.length > 0) 
            ? currentUser.promotion_history.slice().reverse().map(h => `<span class="history-line">${sanitize(h)}</span>`).join('')
            : `<span class="no-history" style="text-align:center; font-style:italic; display:block; color:#ffd700;">No promotion history</span>`;

        content.innerHTML = `<div style="font-size:1.5rem; margin-bottom:10px;">${sanitize(currentUser.display_name)}</div><div class="detail-row" style="width:300px; margin:0 auto;"><span>Organisation</span><span>${sanitize(currentUser.finger)}</span></div><div class="detail-row" style="width:300px; margin:0 auto;"><span>Rank</span><span>${sanitize(currentUser.rank)}</span></div><div style="margin-top:10px; font-weight:bold;">Promotion History:</div>${historyHtml}`;
        document.getElementById('user-info-panel').style.display = 'block';
    }

    document.getElementById('collapse-info-btn').onclick = closeAuth;
    document.getElementById('doLogout').onclick = () => { currentUser = null; location.reload(); };

    document.getElementById('doLogin').onclick = async () => {
        const un = document.getElementById('logUser').value.trim();
        const pw = document.getElementById('logPass').value.trim();
        const snap = await get(ref(db, `users/${un}`));
        if (snap.exists() && snap.val().password === pw) {
            currentUser = snap.val();
            closeAuth();
            document.getElementById('nav-triggers').innerHTML = `<span class="clickable-text" id="mgmt-trigger">Management</span><span class="clickable-text" id="profile-btn">Logged in as ${sanitize(currentUser.display_name)}</span>`;
            document.getElementById('profile-btn').onclick = () => { closeAuth(); showProfile(); };
            document.getElementById('mgmt-trigger').onclick = () => { closeAuth(); loadManagement(); document.getElementById('mgmt-panel').style.display = 'block'; };
        } else alert("Invalid credentials.");
    };

    document.getElementById('doRegister').onclick = async () => {
        const dn = document.getElementById('regDisplay').value.trim();
        const un = document.getElementById('regUser').value.trim();
        const pw = document.getElementById('regPass').value.trim();
        const org = document.getElementById('regOrg').value;
        const err = document.getElementById('reg-error');
        if (!dn || !un || !pw || !org) return;
        const startRank = org === "Thumb" ? "Soldato" : org === "Pinky" ? "Aspiring Star" : org === "Index" ? "Proselyte" : (org === "Middle" ? "Little Brother" : "Little Sister");
        await set(ref(db, `users/${un}`), { display_name: dn, username: un, password: pw, finger: org, rank: startRank, promotion_history: [`Initial rank of ${startRank}.`] });
        location.reload();
    };

    document.getElementById('search-input').oninput = renderList;
</script>
</body>
</html>
