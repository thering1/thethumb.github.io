<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thumb</title>
    <link rel="icon" type="image/png" href="TheThumbIcon.png">
    <style>
        :root {
            --crimson: #4a0404;
            --gold: #ffd700;
            --gold-shadow: rgba(255, 215, 0, 0.4);
        }

        * { scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }

        body {
            margin: 0; padding: 0;
            background: url('thethumbbackground.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Times New Roman', serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--gold);
        }

        #main-box {
            width: 850px;
            background: var(--crimson);
            border: 3px solid var(--gold);
            box-shadow: 0 0 25px var(--gold-shadow);
            padding: 40px;
            position: relative;
            max-height: 85vh;
            overflow-y: scroll;
        }

        /* Top Navigation Styling */
        .top-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            position: relative;
        }
        .nav-link { 
            cursor: pointer; 
            transition: opacity 0.2s; 
            font-style: italic; 
            text-transform: none;
            background: none;
            border: none;
            color: var(--gold);
            font-size: 1rem;
            font-family: inherit;
        }
        .nav-link:hover { opacity: 0.7; }

        /* Fingers Dropdown Content */
        #fingers-menu {
            display: none;
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--crimson);
            border: 1px solid var(--gold);
            padding: 15px;
            z-index: 100;
            grid-template-columns: 1fr;
            gap: 10px;
            width: 250px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .finger-btn {
            display: flex; align-items: center; justify-content: flex-start;
            padding: 10px; border-radius: 2px; cursor: pointer; text-decoration: none;
            font-size: 0.9rem;
            transition: transform 0.1s;
        }
        .finger-btn:hover { transform: scale(1.02); }
        .finger-btn img { width: 24px; margin-right: 12px; }

        /* Themed Finger Buttons */
        .btn-index { background: black; color: #40E0D0; border: 1px solid #40E0D0; font-family: 'Courier New', monospace; }
        .btn-middle { background: #2e004f; color: var(--gold); border: 1px solid var(--gold); font-family: 'Impact', sans-serif; text-transform: uppercase; }
        .btn-ring { background: white; color: black; border: 1px solid black; font-family: Arial, sans-serif; }
        .btn-pinky { background: #8fbc8f; color: #8b0000; border: 1px solid #8b0000; font-family: 'Arial Black', sans-serif; font-weight: bold; text-transform: uppercase; }

        /* Form/Auth Styling */
        .auth-panel { display: none; padding: 20px 0; border-bottom: 1px solid rgba(255,215,0,0.3); margin-bottom: 20px; text-align: center; }
        .formal-input { 
            background: var(--crimson); border: none; border-bottom: 1px solid var(--gold); 
            color: var(--gold); font-style: italic; padding: 5px; font-family: inherit;
            outline: none; margin: 10px; width: 180px;
        }
        select.formal-input { border: 1px solid var(--gold); }
        select.formal-input option { background: var(--crimson); color: var(--gold); }

        .thumb-icon { width: 180px; display: block; margin: 0 auto 15px; }
        h1 { text-align: center; font-size: 3.5rem; margin: 0; letter-spacing: 4px; text-transform: uppercase; }
        .gold-line { width: 90%; height: 1px; background: var(--gold); margin: 25px auto; opacity: 0.7; }

        #search-input { background: transparent; border: none; color: var(--gold); font-style: italic; font-family: inherit; outline: none; width: 280px; font-size: 1.1rem; margin-bottom: 20px; }
        
        .registry-entry { margin-bottom: 15px; border-bottom: 1px solid rgba(255,215,0,0.1); padding-bottom: 10px; }
        .entry-header { display: flex; justify-content: space-between; cursor: pointer; }
        .details { display: none; padding: 15px; font-size: 0.9rem; }
        
        .bold-btn { font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 15px; display: inline-block; border: 1px solid var(--gold); padding: 5px 15px; }
        .action-btn { cursor: pointer; border: 1px solid var(--gold); padding: 3px 8px; font-size: 0.7rem; font-weight: bold; margin-right: 5px; }
    </style>
</head>
<body>

<div id="main-box">
    <div class="top-nav">
        <button class="nav-link" id="signup-trigger">Sign up</button>
        
        <div style="position: relative;">
            <button class="nav-link" id="fingers-trigger">Fingers</button>
            <div id="fingers-menu">
                <a href="https://thering1.github.io/theindex.github.io" class="finger-btn btn-index"><img src="IndexProslytesIcon.png"> The Index</a>
                <a href="https://thering1.github.io/themiddle.github.io" class="finger-btn btn-middle"><img src="thethumb.png"> The Middle</a>
                <a href="https://thering1.github.io/thering.github.io" class="finger-btn btn-ring"><img src="The_Ring_Icon.png"> The Ring</a>
                <a href="https://thering1.github.io/thepinky.github.io" class="finger-btn btn-pinky"><img src="PMLogo.png"> THE PINKY</a>
            </div>
        </div>

        <button class="nav-link" id="login-trigger">Log in</button>
    </div>

    <div id="auth-area">
        <div id="register-panel" class="auth-panel">
            <input type="text" id="regDisplay" placeholder="Display Name" class="formal-input">
            <input type="text" id="regUser" placeholder="Username" class="formal-input">
            <input type="password" id="regPass" placeholder="Password" class="formal-input">
            <select id="regOrg" class="formal-input">
                <option value="" disabled selected>Organisation</option>
                <option value="Index">Index</option>
                <option value="Ring">Ring</option>
                <option value="Middle">Middle</option>
                <option value="Pinky">Pinky</option>
                <option value="Thumb">Thumb</option>
            </select>
            <div id="reg-error" style="color:var(--gold); font-size:0.8rem; margin-top:5px;"></div>
            <div class="bold-btn" id="doRegister">Register</div>
            <div class="nav-link" onclick="closeAuth()">Cancel</div>
        </div>

        <div id="login-panel" class="auth-panel">
            <input type="text" id="logUser" placeholder="Username" class="formal-input">
            <input type="password" id="logPass" placeholder="Password" class="formal-input">
            <div class="bold-btn" id="doLogin">Enter</div>
            <div class="nav-link" onclick="closeAuth()">Cancel</div>
        </div>

        <div id="mgmt-panel" class="auth-panel">
            <h2 style="font-size: 1rem; text-transform: uppercase;">Management</h2>
            <table style="width:100%; text-align:left; font-size:0.85rem;">
                <thead><tr><th>Name</th><th>Rank</th><th>Actions</th></tr></thead>
                <tbody id="mgmt-body"></tbody>
            </table>
            <div class="bold-btn" onclick="closeAuth()">Close</div>
        </div>

        <div id="user-info-panel" class="auth-panel">
            <div id="my-info-content"></div>
            <div class="bold-btn" onclick="closeAuth()">Collapse</div>
            <div class="bold-btn" id="doLogout" style="color:#ff4d4d;">Log out</div>
        </div>
    </div>

    <img src="TheThumbIcon.png" alt="Thumb" class="thumb-icon">
    <h1>The Thumb</h1>
    <div style="text-align: center; font-style: italic;">La vanità del Soldato, la gloria della famiglia.</div>
    <div class="gold-line"></div>

    <input type="text" id="search-input" placeholder="Search by Name, Rank, or Finger...">
    <div id="registry-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const accountConfig = {
        apiKey: "AIzaSyDHSXFPCiG2kjRAFzqUJn1OQoXD1bCtfH8",
        authDomain: "account-data-54450.firebaseapp.com",
        databaseURL: "https://account-data-54450-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "account-data-54450"
    };

    const app = initializeApp(accountConfig);
    const db = getDatabase(app);

    let currentUser = null;
    let allUsers = [];

    const strictSanitize = (str) => str ? str.replace(/<[^>]*>?/gm, '').trim() : "";

    const getWeight = (rankStr) => {
        if (!rankStr) return 0;
        const r = rankStr.toLowerCase();
        if (r.includes("lord")) return 5;
        if (r.includes("great") || r.includes("sottocapo") || r.includes("maestro") || r.includes("messenger")) return 4;
        if (r.includes("star") && !r.includes("aspiring")) return 3;
        if (r.includes("big") || r.includes("capo") || r.includes("docente") || r.includes("proxy")) return 2;
        if (r.includes("aspiring") || r.includes("student") || r.includes("soldato") || r.includes("proselyte") || r.includes("little")) return 1;
        return 0;
    };

    onValue(ref(db, 'users'), (snapshot) => {
        const data = snapshot.val();
        allUsers = [];
        for (let id in data) allUsers.push({ username: id, ...data[id] });
        renderList();
        if (currentUser && data[currentUser.username]) {
            currentUser = { username: currentUser.username, ...data[currentUser.username] };
        }
    });

    function renderList() {
        const filter = document.getElementById('search-input').value.toLowerCase();
        const listDiv = document.getElementById('registry-list');
        listDiv.innerHTML = "";

        const sorted = [...allUsers].sort((a, b) => getWeight(b.rank) - getWeight(a.rank) || a.display_name.localeCompare(b.display_name));

        sorted.forEach(u => {
            if (filter && !(u.display_name.toLowerCase().includes(filter) || u.rank.toLowerCase().includes(filter) || u.finger.toLowerCase().includes(filter))) return;

            const entry = document.createElement('div');
            entry.className = 'registry-entry';
            entry.innerHTML = `
                <div class="entry-header">
                    <span>${u.display_name}</span>
                    <span style="font-style:italic; opacity:0.8;">${u.rank} (${u.finger})</span>
                </div>
                <div class="details">
                    <div style="text-align:center;">History:</div>
                    ${(u.promotion_history || []).slice().reverse().map(h => `<div style="text-align:center; opacity:0.6; font-size:0.8rem;">${h}</div>`).join('')}
                </div>
            `;
            const h = entry.querySelector('.entry-header');
            const d = entry.querySelector('.details');
            h.onclick = () => d.style.display = (d.style.display === 'block' ? 'none' : 'block');
            listDiv.appendChild(entry);
        });
    }

    window.loadManagement = () => {
        const body = document.getElementById('mgmt-body');
        body.innerHTML = "";
        const myW = getWeight(currentUser.rank);

        allUsers.forEach(u => {
            const uW = getWeight(u.rank);
            if (u.finger === currentUser.finger && uW < myW && u.username !== currentUser.username) {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${u.display_name}</td><td>${u.rank}</td><td id="act-${u.username}"></td>`;
                body.appendChild(row);
                const cell = document.getElementById(`act-${u.username}`);
                
                if (uW < 5 && uW < myW) {
                    const p = document.createElement('span'); p.className="action-btn"; p.innerText="Promote";
                    p.onclick = () => changeRank(u, 1); cell.appendChild(p);
                }
                if (uW > 1) {
                    const d = document.createElement('span'); d.className="action-btn"; d.innerText="Demote"; d.style.color="#ff4d4d";
                    d.onclick = () => changeRank(u, -1); cell.appendChild(d);
                }
            }
        });
    };

    async function changeRank(user, dir) {
        const curW = getWeight(user.rank);
        const newW = curW + dir;
        const rankMap = {
            "Index": ["Proselyte", "Proxy", "", "Messenger"],
            "Ring": ["Student", "Docente", "", "Maestro", "Lord"],
            "Pinky": ["Aspiring Star", "", "Star"],
            "Thumb": ["Soldato", "Capo", "", "Sottocapo"]
        };

        let newBase = "";
        if (user.finger === "Middle") {
            const gender = user.rank.toLowerCase().includes("sister") ? "Sister" : "Brother";
            newBase = ["", "Little", "Big", "", "Great"][newW] + " " + gender;
        } else {
            newBase = rankMap[user.finger][newW - 1];
        }

        let finalRank = newBase;
        if (user.rank.includes(" - ")) finalRank += " - " + user.rank.split(" - ")[1];

        const history = user.promotion_history || [];
        history.push(`${dir > 0 ? "Promoted" : "Demoted"} to ${finalRank}`);
        await update(ref(db, `users/${user.username}`), { rank: finalRank, promotion_history: history });
        loadManagement();
    }

    window.closeAuth = () => {
        document.querySelectorAll('.auth-panel').forEach(p => p.style.display = 'none');
        document.getElementById('fingers-menu').style.display = 'none';
    };

    document.getElementById('fingers-trigger').onclick = (e) => {
        e.stopPropagation();
        const m = document.getElementById('fingers-menu');
        m.style.display = (m.style.display === 'grid' ? 'none' : 'grid');
    };

    document.onclick = () => {
        document.getElementById('fingers-menu').style.display = 'none';
        const authMenu = document.getElementById('fingers-menu-auth');
        if(authMenu) authMenu.style.display = 'none';
    };

    document.getElementById('signup-trigger').onclick = () => { closeAuth(); document.getElementById('register-panel').style.display='block'; };
    document.getElementById('login-trigger').onclick = () => { if(currentUser) showProfile(); else { closeAuth(); document.getElementById('login-panel').style.display='block'; }};

    function showProfile() {
        closeAuth();
        const content = document.getElementById('my-info-content');
        content.innerHTML = `<div style="font-size:1.1rem; margin-bottom:5px;">${currentUser.display_name}</div><div>${currentUser.rank} (${currentUser.finger})</div>`;
        document.getElementById('user-info-panel').style.display = 'block';
    }

    document.getElementById('doLogin').onclick = async () => {
        const un = strictSanitize(document.getElementById('logUser').value);
        const pw = document.getElementById('logPass').value;
        const snap = await get(ref(db, `users/${un}`));
        if (snap.exists() && snap.val().password === pw) {
            currentUser = { username: un, ...snap.val() };
            closeAuth();
            document.querySelector('.top-nav').innerHTML = `
                <button class="nav-link" onclick="loadManagement(); document.getElementById('mgmt-panel').style.display='block';">Management</button>
                <div style="position:relative;">
                    <button class="nav-link" id="fingers-trigger-auth">Fingers</button>
                    <div id="fingers-menu-auth" style="display:none; position:absolute; top:30px; left:50%; transform:translateX(-50%); background:var(--crimson); border:1px solid var(--gold); padding:10px; z-index:100; width:220px; grid-template-columns: 1fr; gap: 10px;">
                        <a href="https://thering1.github.io/theindex.github.io" class="finger-btn btn-index"><img src="IndexProslytesIcon.png"> The Index</a>
                        <a href="https://thering1.github.io/themiddle.github.io" class="finger-btn btn-middle"><img src="thethumb.png"> The Middle</a>
                        <a href="https://thering1.github.io/thering.github.io" class="finger-btn btn-ring"><img src="The_Ring_Icon.png"> The Ring</a>
                        <a href="https://thering1.github.io/thepinky.github.io" class="finger-btn btn-pinky"><img src="PMLogo.png"> THE PINKY</a>
                    </div>
                </div>
                <button class="nav-link" onclick="showProfile()">Profile</button>`;
            
            const ft = document.getElementById('fingers-trigger-auth');
            const fm = document.getElementById('fingers-menu-auth');
            ft.onclick = (e) => { e.stopPropagation(); fm.style.display = (fm.style.display === 'block' ? 'none' : 'block'); };
        } else alert("Access Denied.");
    };

    document.getElementById('doRegister').onclick = async () => {
        const dn = strictSanitize(document.getElementById('regDisplay').value);
        const un = strictSanitize(document.getElementById('regUser').value);
        const pw = document.getElementById('regPass').value;
        const org = document.getElementById('regOrg').value;
        const err = document.getElementById('reg-error');

        if (!dn || !un || !pw || !org) { err.innerText = "Fields incomplete."; return; }
        if (allUsers.some(u => u.username.toLowerCase() === un.toLowerCase() || u.display_name.toLowerCase() === dn.toLowerCase())) {
            err.innerText = "Identity already exists."; return;
        }

        const startR = {"Index":"Proselyte", "Ring":"Student", "Middle":"Little Brother", "Pinky":"Aspiring Star", "Thumb":"Soldato"}[org];
        await set(ref(db, `users/${un}`), { display_name: dn, password: pw, finger: org, rank: startR, promotion_history: [`Initiated as ${startR}`] });
        
        document.getElementById('regDisplay').value = ""; document.getElementById('regUser').value = "";
        document.getElementById('regPass').value = ""; document.getElementById('regOrg').selectedIndex = 0;
        alert("Account Created."); closeAuth();
    };

    document.getElementById('doLogout').onclick = () => location.reload();
    document.getElementById('search-input').oninput = renderList;
</script>
</body>
</html>
