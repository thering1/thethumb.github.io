<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thumb</title>
    <link rel="icon" type="image/png" href="TheThumbIcon.png">
    <style>
        :root {
            --crimson: #4a0404;
            --gold: #ffd700;
            --gold-shadow: rgba(255, 215, 0, 0.4);
        }

        * { scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }

        body {
            margin: 0; padding: 0;
            background: url('thethumbbackground.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Times New Roman', serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--gold);
        }

        #main-box {
            width: 800px;
            background: var(--crimson);
            border: 3px solid var(--gold);
            box-shadow: 0 0 25px var(--gold-shadow);
            padding: 40px;
            position: relative;
            max-height: 85vh;
            overflow-y: scroll;
        }

        .top-nav { display: flex; justify-content: space-between; font-size: 1rem; margin-bottom: 10px; }
        .clickable-text { cursor: pointer; transition: opacity 0.2s; font-style: italic; }
        .clickable-text:hover { opacity: 0.7; }

        .auth-panel { 
            display: none; padding: 20px 0; border-bottom: 1px solid rgba(255,215,0,0.3); 
            margin-bottom: 20px; text-align: center; animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }

        .formal-input { 
            background: var(--crimson); border: none; border-bottom: 1px solid var(--gold); 
            color: var(--gold); font-style: italic; padding: 5px; font-family: inherit;
            outline: none; margin: 10px; width: 160px;
        }

        select.formal-input { border: 1px solid var(--gold); cursor: pointer; }
        select.formal-input option { background-color: var(--crimson); color: var(--gold); }

        .thumb-icon { width: 180px; display: block; margin: 0 auto 15px; }
        h1 { text-align: center; font-size: 3.5rem; margin: 0; letter-spacing: 4px; text-transform: uppercase; }
        .motto { text-align: center; font-style: italic; font-size: 1.2rem; margin-top: 10px; line-height: 1.4; }
        .gold-line { width: 90%; height: 1px; background: var(--gold); margin: 25px auto; opacity: 0.7; }

        #search-input {
            background: transparent; border: none; color: var(--gold);
            font-style: italic; font-family: inherit; outline: none;
            width: 250px; font-size: 1.1rem; margin-bottom: 20px;
        }
        #search-input::placeholder { color: var(--gold); opacity: 0.7; }

        .mgmt-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        .mgmt-table td, .mgmt-table th { padding: 10px; text-align: left; border-bottom: 1px solid rgba(255,215,0,0.2); }
        
        .action-group { display: flex; gap: 10px; }
        .action-btn { cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; border: 1px solid var(--gold); padding: 3px 8px; }
        .action-btn:hover { background: var(--gold); color: var(--crimson); }

        .registry-entry { margin-bottom: 15px; font-size: 1.15rem; }
        .entry-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; width: 100%; }
        .details { display: none; padding: 20px 0; font-size: 1rem; border-top: 1px dashed rgba(255,215,0,0.2); margin-top: 10px; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .history-line { display: block; font-size: 0.9rem; margin-top: 5px; opacity: 0.8; text-align: center; font-style: italic; }
        
        .bold-btn { font-weight: bold; cursor: pointer; text-transform: uppercase; margin: 15px; display: inline-block; }
    </style>
</head>
<body>

<div id="main-box">
    <div class="top-nav" id="nav-triggers">
        <span class="clickable-text" id="signup-trigger">Sign up</span>
        <span class="clickable-text" id="login-trigger">Log in</span>
    </div>

    <div id="auth-area">
        <div id="register-panel" class="auth-panel">
            <input type="text" id="regDisplay" placeholder="Display Name" class="formal-input">
            <input type="text" id="regUser" placeholder="Username" class="formal-input">
            <input type="password" id="regPass" placeholder="Password" class="formal-input">
            <select id="regOrg" class="formal-input">
                <option value="" disabled selected>Organisation</option>
                <option value="Index">Index</option>
                <option value="Ring">Ring</option>
                <option value="Middle">Middle</option>
                <option value="Pinky">Pinky</option>
                <option value="Thumb">Thumb</option>
            </select>
            <div id="reg-error" style="color:var(--gold); font-size:0.8rem; height: 15px;"></div>
            <div class="bold-btn" id="doRegister">Register</div>
            <div class="clickable-text" onclick="closeAuth()">Cancel</div>
        </div>

        <div id="login-panel" class="auth-panel">
            <input type="text" id="logUser" placeholder="Username" class="formal-input">
            <input type="password" id="logPass" placeholder="Password" class="formal-input">
            <div class="bold-btn" id="doLogin">Enter</div>
            <div class="clickable-text" onclick="closeAuth()">Cancel</div>
        </div>

        <div id="mgmt-panel" class="auth-panel">
            <h2 style="font-size: 1.2rem; border-bottom: 1px solid var(--gold); display: inline-block; padding-bottom: 5px; text-transform: uppercase;">Management</h2>
            <table class="mgmt-table">
                <thead><tr><th>Name</th><th>Rank</th><th>Actions</th></tr></thead>
                <tbody id="mgmt-body"></tbody>
            </table>
            <div class="bold-btn" onclick="closeAuth()">Close</div>
        </div>

        <div id="user-info-panel" class="auth-panel">
            <div id="my-info-content"></div>
            <div class="bold-btn" id="collapse-info-btn">Collapse Information</div>
            <div class="bold-btn" id="doLogout" style="color:#ff4d4d;">Log out</div>
        </div>
    </div>

    <img src="TheThumbIcon.png" alt="Thumb" class="thumb-icon">
    <h1>The Thumb</h1>
    <div class="motto">La vanità del Soldato,<br>la gloria della famiglia.</div>
    <div class="gold-line"></div>

    <input type="text" id="search-input" placeholder="Search by Name, Rank, or Finger...">
    <div id="registry-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const accountConfig = {
        apiKey: "AIzaSyDHSXFPCiG2kjRAFzqUJn1OQoXD1bCtfH8",
        authDomain: "account-data-54450.firebaseapp.com",
        databaseURL: "https://account-data-54450-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "account-data-54450"
    };

    const app = initializeApp(accountConfig);
    const db = getDatabase(app);

    let currentUser = null;
    let allUsers = [];

    // KEYWORD BASED WEIGHTING
    const getWeight = (rankStr) => {
        if (!rankStr) return 0;
        const r = rankStr.toLowerCase();
        
        // Tier 5: Absolute Leaders
        if (r.includes("lord")) return 5;
        
        // Tier 4: High Council
        if (r.includes("great") || r.includes("sottocapo") || r.includes("maestro") || r.includes("messenger")) return 4;
        
        // Tier 3: The Stars (Pinky Core + Multi-finger variants)
        // Checks if 'star' is present but 'aspiring' is not.
        if (r.includes("star") && !r.includes("aspiring")) return 3;
        
        // Tier 2: Officers
        if (r.includes("big") || r.includes("capo") || r.includes("docente") || r.includes("proxy")) return 2;
        
        // Tier 1: Initiates
        if (r.includes("aspiring") || r.includes("student") || r.includes("soldato") || r.includes("proselyte") || r.includes("little")) return 1;
        
        return 0;
    };

    const sanitize = (str) => {
        const div = document.createElement('div');
        div.textContent = str || "";
        return div.innerHTML;
    };

    onValue(ref(db, 'users'), (snapshot) => {
        const data = snapshot.val();
        allUsers = [];
        for (let id in data) allUsers.push({ username: id, ...data[id] });
        renderList();
        if (currentUser && data[currentUser.username]) {
            currentUser = { username: currentUser.username, ...data[currentUser.username] };
            if (document.getElementById('mgmt-panel').style.display === 'block') loadManagement();
        }
    });

    function renderList() {
        const filter = document.getElementById('search-input').value.toLowerCase();
        const listDiv = document.getElementById('registry-list');
        listDiv.innerHTML = "";

        const sorted = [...allUsers].sort((a, b) => getWeight(b.rank) - getWeight(a.rank) || a.display_name.localeCompare(b.display_name));

        sorted.forEach(u => {
            const matches = u.display_name.toLowerCase().includes(filter) || 
                            u.rank.toLowerCase().includes(filter) || 
                            u.finger.toLowerCase().includes(filter);
            
            if (filter && !matches) return;

            const entry = document.createElement('div');
            entry.className = 'registry-entry';
            entry.innerHTML = `
                <div class="entry-header">
                    <span style="flex:1">${sanitize(u.display_name)}</span>
                    <span style="flex:1; text-align:right; font-style:italic; margin-right:25px;">${sanitize(u.rank)} of the ${sanitize(u.finger)}</span>
                    <span style="width:20px; text-align:right;">+</span>
                </div>
                <div class="details">
                    <div class="detail-row"><span>Organisation</span><span>${sanitize(u.finger)}</span></div>
                    <div class="detail-row"><span>Rank</span><span>${sanitize(u.rank)}</span></div>
                    <div style="margin-top:15px; text-align:center;">History:</div>
                    ${(u.promotion_history || []).slice().reverse().map(h => `<span class="history-line">${sanitize(h)}</span>`).join('') || '<span style="display:block;text-align:center;opacity:0.5;">None</span>'}
                </div>
            `;
            const h = entry.querySelector('.entry-header');
            const d = entry.querySelector('.details');
            h.onclick = () => {
                const vis = d.style.display === 'block';
                d.style.display = vis ? 'none' : 'block';
                h.querySelector('span:last-child').innerText = vis ? '+' : '-';
            };
            listDiv.appendChild(entry);
        });
    }

    window.loadManagement = () => {
        const body = document.getElementById('mgmt-body');
        body.innerHTML = "";
        if (!currentUser) return;

        const myW = getWeight(currentUser.rank);
        allUsers.forEach(u => {
            const uW = getWeight(u.rank);
            // Must be same finger AND strictly lower weight
            if (u.finger === currentUser.finger && uW < myW && u.username !== currentUser.username) {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${sanitize(u.display_name)}</td><td>${sanitize(u.rank)}</td><td id="act-${u.username}"></td>`;
                body.appendChild(row);
                
                const cell = document.getElementById(`act-${u.username}`);
                const actionGroup = document.createElement('div');
                actionGroup.className = "action-group";

                // Promote button (if not at Lord level 5)
                if (uW < 5 && uW < (myW - 0)) { 
                    const p = document.createElement('span'); p.className="action-btn"; p.innerText="Promote";
                    p.onclick = () => changeRank(u, 1); actionGroup.appendChild(p);
                }
                // Demote button (if not at lowest initiate level 1)
                if (uW > 1) {
                    const d = document.createElement('span'); d.className="action-btn"; d.innerText="Demote"; d.style.color="#ff4d4d";
                    d.onclick = () => changeRank(u, -1); actionGroup.appendChild(d);
                }
                cell.appendChild(actionGroup);
            }
        });
    };

    async function changeRank(user, dir) {
        const curW = getWeight(user.rank);
        const newW = curW + dir;
        
        // Predefined Rank Strings for conversion
        const rankMap = {
            "Index": ["Proselyte", "Proxy", "Messenger"],
            "Ring": ["Student", "Docente", "Maestro", "Lord"],
            "Pinky": ["Aspiring Star", "Star"],
            "Thumb": ["Soldato", "Capo", "Sottocapo"]
        };

        let newBaseRank = "";

        if (user.finger === "Middle") {
            const gender = user.rank.toLowerCase().includes("sister") ? "Sister" : "Brother";
            const tiers = ["", "Little", "Big", "Great"];
            newBaseRank = tiers[newW] + " " + gender;
        } else if (user.finger === "Pinky") {
            newBaseRank = rankMap["Pinky"][newW - 1] || user.rank;
        } else {
            // Adjust index because some fingers have fewer than 5 tiers
            const list = rankMap[user.finger];
            // Maps weight to the appropriate list index
            // e.g. For Index: Weight 1=Proselyte, 2=Proxy, 4=Messenger
            if (user.finger === "Index") {
                if (newW === 1) newBaseRank = "Proselyte";
                if (newW === 2) newBaseRank = "Proxy";
                if (newW === 4) newBaseRank = "Messenger";
            } else if (user.finger === "Ring") {
                if (newW === 1) newBaseRank = "Student";
                if (newW === 2) newBaseRank = "Docente";
                if (newW === 4) newBaseRank = "Maestro";
                if (newW === 5) newBaseRank = "Lord";
            } else if (user.finger === "Thumb") {
                if (newW === 1) newBaseRank = "Soldato";
                if (newW === 2) newBaseRank = "Capo";
                if (newW === 4) newBaseRank = "Sottocapo";
            }
        }

        // Handle the suffix preservation (e.g., " - District 24")
        let finalRank = newBaseRank;
        if (user.rank.includes(" - ")) {
            const suffix = user.rank.split(" - ")[1];
            finalRank = newBaseRank + " - " + suffix;
        }

        const history = user.promotion_history || [];
        history.push(`${dir > 0 ? "Promoted" : "Demoted"} from ${user.rank} to ${finalRank}`);
        await update(ref(db, `users/${user.username}`), { rank: finalRank, promotion_history: history });
    }

    window.closeAuth = () => document.querySelectorAll('.auth-panel').forEach(p => p.style.display = 'none');
    document.getElementById('signup-trigger').onclick = () => { closeAuth(); document.getElementById('register-panel').style.display='block'; };
    document.getElementById('login-trigger').onclick = () => { if(currentUser) showProfile(); else { closeAuth(); document.getElementById('login-panel').style.display='block'; }};

    function showProfile() {
        closeAuth();
        const content = document.getElementById('my-info-content');
        content.innerHTML = `<div style="font-size:1.5rem; margin-bottom:10px;">${sanitize(currentUser.display_name)}</div>
        <div class="detail-row" style="width:300px; margin:0 auto;"><span>Organisation</span><span>${sanitize(currentUser.finger)}</span></div>
        <div class="detail-row" style="width:300px; margin:0 auto;"><span>Rank</span><span>${sanitize(currentUser.rank)}</span></div>`;
        document.getElementById('user-info-panel').style.display = 'block';
    }

    document.getElementById('doLogout').onclick = () => location.reload();

    document.getElementById('doLogin').onclick = async () => {
        const un = document.getElementById('logUser').value.trim();
        const pw = document.getElementById('logPass').value.trim();
        const snap = await get(ref(db, `users/${un}`));
        if (snap.exists() && snap.val().password === pw) {
            currentUser = { username: un, ...snap.val() };
            closeAuth();
            document.getElementById('nav-triggers').innerHTML = `<span class="clickable-text" onclick="loadManagement(); document.getElementById('mgmt-panel').style.display='block';">Management</span><span class="clickable-text" id="profile-btn">Logged in as ${sanitize(currentUser.display_name)}</span>`;
            document.getElementById('profile-btn').onclick = showProfile;
        } else alert("Invalid credentials.");
    };

    document.getElementById('doRegister').onclick = async () => {
        const dn = document.getElementById('regDisplay').value.trim();
        const un = document.getElementById('regUser').value.trim();
        const pw = document.getElementById('regPass').value.trim();
        const org = document.getElementById('regOrg').value;
        const err = document.getElementById('reg-error');

        if (!dn || !un || !pw || !org) return;

        const taken = allUsers.some(u => u.username.toLowerCase() === un.toLowerCase() || u.display_name.toLowerCase() === dn.toLowerCase());
        if (taken) { err.innerText = "Username or Display Name already exists."; return; }

        let startR = "";
        if (org === "Index") startR = "Proselyte";
        else if (org === "Ring") startR = "Student";
        else if (org === "Middle") startR = "Little Brother"; 
        else if (org === "Pinky") startR = "Aspiring Star";
        else if (org === "Thumb") startR = "Soldato";

        await set(ref(db, `users/${un}`), { 
            display_name: dn, password: pw, finger: org, rank: startR, 
            promotion_history: [`Initial rank of ${startR}.`] 
        });

        document.getElementById('regDisplay').value = "";
        document.getElementById('regUser').value = "";
        document.getElementById('regPass').value = "";
        document.getElementById('regOrg').selectedIndex = 0;
        err.innerText = "";
        
        alert("Account Created.");
        closeAuth();
    };

    document.getElementById('search-input').oninput = renderList;
</script>
</body>
</html>
